version: 2
updates:
- package-ecosystem: "cargo"
  directory: "/"
  schedule:
    interval: "daily"
  cooldown:
    default-days: 10
- package-ecosystem: "docker"
  directory: "/.devcontainer"
  schedule:
    interval: "daily"
  cooldown:
    default-days: 10
- package-ecosystem: "devcontainers"
  directory: "/"
  schedule:
    interval: "daily"
  cooldown:
    default-days: 10
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "wednesday"
  cooldown:
    default-days: 10
